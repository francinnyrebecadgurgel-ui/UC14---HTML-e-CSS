<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>formulario</title>

<body>
<br>
<h3>informações basicas</h3>
    <label for="seu nome">Nome</label>
    <input type="text" name="seu nome" placeholder="nome">
<br>
<label for="seu gmail">E-mail</label>
<input type="E-mail" name="seu gmail" placeholder="e-mail">
<br>
<label for="sua senha">sua senha</label>
<input type="password" name="sua senha" placeholder="senha">
<br>
<h3>Dados pessoais</h3>
<label for="date">Data de aniversario</label>
<input type="date" name="date"placeholder= data>
<br>
<label for="idade">Idade</label>
<input type="number" name="idade" min="1" max="120" placeholder="idade">
<br>
<label for="cor">Cor favorita</label>
<input type="color" name="cor" placeholder="cor favorita">
<br>
<label for="genero">Genero</label>
<input type="radio" name="genero"> masculino
<input type="radio" name="genero"> feminino
<br>
<label for="interesses">qual voce prefere?</label>
<input type="checkbox" name="calor"> calor
<input type="checkbox" name="frio"> frio
<input type="checkbox" name="nao sei"> nao sei>
<br>

<input type="file" name="sdf">
